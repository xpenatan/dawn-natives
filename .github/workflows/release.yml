name: dawn-natives

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  actions: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  cancel-previous:
    name: Cancel Previous Runs
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

  linux:
    name: Linux x64
    needs: cancel-previous
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libx11-dev libx11-xcb-dev libwayland-dev
      - name: Build package
        run: ./gradlew --no-daemon packageLinuxX64
      - uses: actions/upload-artifact@v7
        with:
          name: dawn-natives-linux-x64-gcc
          path: build/packages/dawn-natives-linux-x64-gcc
          if-no-files-found: error

  windows:
    name: Windows x64
    needs: cancel-previous
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - name: Build package
        run: .\gradlew.bat --no-daemon packageWindowsX64
      - uses: actions/upload-artifact@v7
        with:
          name: dawn-natives-windows-x64-msvc
          path: build/packages/dawn-natives-windows-x64-msvc
          if-no-files-found: error

  macos_x64:
    name: macOS x64
    needs: cancel-previous
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Build package
        run: ./gradlew --no-daemon packageMacosX64
      - uses: actions/upload-artifact@v7
        with:
          name: dawn-natives-macos-x64-appleclang
          path: build/packages/dawn-natives-macos-x64-appleclang
          if-no-files-found: error

  macos_arm64:
    name: macOS arm64
    needs: cancel-previous
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Build package
        run: ./gradlew --no-daemon packageMacosArm64
      - uses: actions/upload-artifact@v7
        with:
          name: dawn-natives-macos-arm64-appleclang
          path: build/packages/dawn-natives-macos-arm64-appleclang
          if-no-files-found: error

  android:
    name: Android ${{ matrix.abi }}
    needs: cancel-previous
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            task: packageAndroidArm64V8a
            artifact: dawn-natives-android-arm64-v8a
          - abi: armeabi-v7a
            task: packageAndroidArmeabiV7a
            artifact: dawn-natives-android-armeabi-v7a
          - abi: x86
            task: packageAndroidX86
            artifact: dawn-natives-android-x86
          - abi: x86_64
            task: packageAndroidX8664
            artifact: dawn-natives-android-x86_64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: android-actions/setup-android@v4
      - name: Read Android toolchain pins
        id: pins
        shell: bash
        run: |
          ndk_version=
          min_sdk=
          cmake_version=
          ./gradlew --no-daemon -q printNativeDepsConfig > "$RUNNER_TEMP/dawn-natives.properties"
          while IFS='=' read -r key value; do
            case "$key" in
              android.ndkVersion) ndk_version="$value" ;;
              android.minSdk) min_sdk="$value" ;;
              android.cmakeVersion) cmake_version="$value" ;;
            esac
          done < "$RUNNER_TEMP/dawn-natives.properties"
          if [[ -z "$ndk_version" || -z "$min_sdk" || -z "$cmake_version" ]]; then
            echo "Missing Android toolchain pin from printNativeDepsConfig." >&2
            exit 1
          fi
          {
            echo "ndk-version=$ndk_version"
            echo "min-sdk=$min_sdk"
            echo "cmake-version=$cmake_version"
          } >> "$GITHUB_OUTPUT"
      - name: Install Android native toolchain
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses
          set -o pipefail
          sdkmanager \
            "platforms;android-${{ steps.pins.outputs.min-sdk }}" \
            "ndk;${{ steps.pins.outputs.ndk-version }}" \
            "cmake;${{ steps.pins.outputs.cmake-version }}"
          echo "$ANDROID_HOME/cmake/${{ steps.pins.outputs.cmake-version }}/bin" >> "$GITHUB_PATH"
      - name: Build package
        run: ./gradlew --no-daemon ${{ matrix.task }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: build/packages/${{ matrix.artifact }}
          if-no-files-found: error

  ios:
    name: iOS ${{ matrix.name }}
    needs: cancel-previous
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arm64
            task: packageIosArm64
            artifact: dawn-natives-ios-arm64-appleclang
          - name: simulator arm64
            task: packageIosSimulatorArm64
            artifact: dawn-natives-ios-simulator-arm64-appleclang
          - name: simulator x64
            task: packageIosSimulatorX64
            artifact: dawn-natives-ios-simulator-x64-appleclang
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Build package
        run: ./gradlew --no-daemon ${{ matrix.task }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: build/packages/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - linux
      - windows
      - macos_x64
      - macos_arm64
      - android
      - ios
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/download-artifact@v8
        with:
          pattern: dawn-natives-*
          path: build/packages
      - name: Write release manifest
        run: ./gradlew --no-daemon writeReleaseManifest
      - name: Read package version
        if: github.event_name == 'workflow_dispatch'
        id: package_version
        shell: bash
        run: |
          package_version="$(./gradlew --no-daemon -q printNativeDepsConfig | sed -n 's/^package.version=//p')"
          if [[ -z "$package_version" ]]; then
            echo "package.version was not printed by printNativeDepsConfig" >&2
            exit 1
          fi
          echo "version=$package_version" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: dawn-natives-release
          path: build/packages
          if-no-files-found: error
      - name: Prepare GitHub release assets
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          rm -rf build/release-assets
          mkdir -p build/release-assets
          while IFS= read -r -d '' package_dir; do
            package_name="$(basename "$package_dir")"
            (cd "$package_dir" && zip -qr "$GITHUB_WORKSPACE/build/release-assets/${package_name}.zip" .)
          done < <(find build/packages -mindepth 1 -maxdepth 1 -type d -name 'dawn-natives-*' -print0 | sort -z)
          cp build/packages/dawn-natives-manifest.json build/release-assets/
      - name: Compute release metadata
        if: github.event_name == 'workflow_dispatch'
        id: release_metadata
        shell: bash
        env:
          PACKAGE_VERSION: ${{ steps.package_version.outputs.version }}
        run: |
          readable_date="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          tag_name="v${PACKAGE_VERSION}"
          release_name="$tag_name"
          {
            echo "tag_name=$tag_name"
            echo "release_name=$release_name"
            echo "body_path=$RUNNER_TEMP/dawn-natives-release-notes.md"
          } >> "$GITHUB_OUTPUT"
          {
            echo "dawn-natives build ${GITHUB_RUN_NUMBER}"
            echo
            echo "UTC build date: ${readable_date}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > "$RUNNER_TEMP/dawn-natives-release-notes.md"
      - name: Update version tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          TAG_NAME: ${{ steps.release_metadata.outputs.tag_name }}
        run: |
          git tag -f "$TAG_NAME" "$GITHUB_SHA"
          git push --force origin "refs/tags/$TAG_NAME"
      - name: Publish GitHub release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_metadata.outputs.tag_name }}
          name: ${{ steps.release_metadata.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ steps.release_metadata.outputs.body_path }}
          overwrite_files: true
          fail_on_unmatched_files: true
          make_latest: true
          files: build/release-assets/*
