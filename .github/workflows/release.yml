name: dawn-natives

on:
  workflow_dispatch:
    inputs:
      publishRelease:
        description: Publish a GitHub release after the build succeeds
        required: true
        type: boolean
        default: false

permissions:
  actions: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  cancel-previous:
    name: Cancel Previous Runs
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

  linux:
    name: Linux x64
    needs: cancel-previous
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libx11-dev libx11-xcb-dev libwayland-dev
      - name: Build package
        run: ./gradlew --no-daemon packageLinuxX64
      - uses: actions/upload-artifact@v7
        with:
          name: dawn-natives-linux-x64-gcc
          path: build/packages/dawn-natives-linux-x64-gcc
          if-no-files-found: error

  windows:
    name: Windows x64
    needs: cancel-previous
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - name: Build package
        run: .\gradlew.bat --no-daemon packageWindowsX64
      - uses: actions/upload-artifact@v7
        with:
          name: dawn-natives-windows-x64-msvc
          path: build/packages/dawn-natives-windows-x64-msvc
          if-no-files-found: error

  macos_x64:
    name: macOS x64
    needs: cancel-previous
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Build package
        run: ./gradlew --no-daemon packageMacosX64
      - uses: actions/upload-artifact@v7
        with:
          name: dawn-natives-macos-x64
          path: build/packages/dawn-natives-macos-x64
          if-no-files-found: error

  macos_arm64:
    name: macOS arm64
    needs: cancel-previous
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Build package
        run: ./gradlew --no-daemon packageMacosArm64
      - uses: actions/upload-artifact@v7
        with:
          name: dawn-natives-macos-arm64
          path: build/packages/dawn-natives-macos-arm64
          if-no-files-found: error

  android:
    name: Android ${{ matrix.abi }}
    needs: cancel-previous
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            task: packageAndroidArm64V8a
            artifact: dawn-natives-android-arm64-v8a
          - abi: armeabi-v7a
            task: packageAndroidArmeabiV7a
            artifact: dawn-natives-android-armeabi-v7a
          - abi: x86
            task: packageAndroidX86
            artifact: dawn-natives-android-x86
          - abi: x86_64
            task: packageAndroidX8664
            artifact: dawn-natives-android-x86_64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: android-actions/setup-android@v4
        with:
          packages: ''
      - name: Read Android toolchain pins
        id: pins
        shell: bash
        run: |
          ndk_version=
          min_sdk=
          cmake_version=
          ./gradlew --no-daemon -q printNativeDepsConfig > "$RUNNER_TEMP/dawn-natives.properties"
          while IFS='=' read -r key value; do
            case "$key" in
              android.ndkVersion) ndk_version="$value" ;;
              android.minSdk) min_sdk="$value" ;;
              android.cmakeVersion) cmake_version="$value" ;;
            esac
          done < "$RUNNER_TEMP/dawn-natives.properties"
          if [[ -z "$ndk_version" || -z "$min_sdk" || -z "$cmake_version" ]]; then
            echo "Missing Android toolchain pin from printNativeDepsConfig." >&2
            exit 1
          fi
          {
            echo "ndk-version=$ndk_version"
            echo "min-sdk=$min_sdk"
            echo "cmake-version=$cmake_version"
          } >> "$GITHUB_OUTPUT"
      - name: Install Android native toolchain
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses
          set -o pipefail
          sdkmanager \
            "platforms;android-${{ steps.pins.outputs.min-sdk }}" \
            "ndk;${{ steps.pins.outputs.ndk-version }}" \
            "cmake;${{ steps.pins.outputs.cmake-version }}"
          echo "$ANDROID_HOME/cmake/${{ steps.pins.outputs.cmake-version }}/bin" >> "$GITHUB_PATH"
      - name: Build package
        run: ./gradlew --no-daemon ${{ matrix.task }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: build/packages/${{ matrix.artifact }}
          if-no-files-found: error

  ios:
    name: iOS ${{ matrix.name }}
    needs: cancel-previous
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arm64
            task: packageIosArm64
            artifact: dawn-natives-ios-arm64
          - name: simulator arm64
            task: packageIosSimulatorArm64
            artifact: dawn-natives-ios-simulator-arm64
          - name: simulator x64
            task: packageIosSimulatorX64
            artifact: dawn-natives-ios-simulator-x64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Build package
        run: ./gradlew --no-daemon ${{ matrix.task }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: build/packages/${{ matrix.artifact }}
          if-no-files-found: error

  web:
    name: Web Emdawnwebgpu
    needs: cancel-previous
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Read Emscripten pin
        id: pins
        shell: bash
        run: |
          emscripten_version=
          ./gradlew --no-daemon -q printNativeDepsConfig > "$RUNNER_TEMP/dawn-natives.properties"
          while IFS='=' read -r key value; do
            case "$key" in
              web.emscriptenVersion) emscripten_version="$value" ;;
            esac
          done < "$RUNNER_TEMP/dawn-natives.properties"
          if [[ -z "$emscripten_version" ]]; then
            echo "Missing Emscripten pin from printNativeDepsConfig." >&2
            exit 1
          fi
          echo "emscripten-version=$emscripten_version" >> "$GITHUB_OUTPUT"
      - uses: mymindstorm/setup-emsdk@v16
        with:
          version: ${{ steps.pins.outputs.emscripten-version }}
      - name: Build package
        run: ./gradlew --no-daemon packageWeb
      - uses: actions/upload-artifact@v7
        with:
          name: dawn-natives-web-emdawnwebgpu
          path: build/packages/dawn-natives-web-emdawnwebgpu
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - linux
      - windows
      - macos_x64
      - macos_arm64
      - android
      - ios
      - web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/download-artifact@v8
        with:
          pattern: dawn-natives-*
          path: build/packages
      - name: Write release manifest
        run: ./gradlew --no-daemon writeReleaseManifest
      - name: Read build metadata
        id: build_metadata
        shell: bash
        run: |
          dawn_chromium_version=
          dawn_ref=
          ./gradlew --no-daemon -q printNativeDepsConfig > "$RUNNER_TEMP/dawn-natives.properties"
          while IFS='=' read -r key value; do
            case "$key" in
              dawn.chromiumVersion) dawn_chromium_version="$value" ;;
              dawn.ref) dawn_ref="$value" ;;
            esac
          done < "$RUNNER_TEMP/dawn-natives.properties"
          if [[ -z "$dawn_chromium_version" || -z "$dawn_ref" ]]; then
            echo "Missing build metadata from printNativeDepsConfig." >&2
            exit 1
          fi
          {
            echo "dawn_chromium_version=$dawn_chromium_version"
            echo "dawn_ref=$dawn_ref"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### dawn-natives build"
            echo
            echo "- Dawn Chromium version: ${dawn_chromium_version}"
            echo "- Dawn ref: ${dawn_ref}"
            echo "- Publish release: ${{ inputs.publishRelease }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: dawn-natives-manifest
          path: build/packages/dawn-natives-manifest.json
          if-no-files-found: error
      - name: Prepare GitHub release assets
        if: inputs.publishRelease
        shell: bash
        run: |
          rm -rf build/release-assets
          mkdir -p build/release-assets
          while IFS= read -r -d '' package_dir; do
            if [[ ! -f "$package_dir/cmake/dawn-natives-targets.cmake" && ! -f "$package_dir/emdawnwebgpu.port.py" ]]; then
              continue
            fi
            package_name="$(basename "$package_dir")"
            (cd "$package_dir" && zip -qr "$GITHUB_WORKSPACE/build/release-assets/${package_name}.zip" .)
          done < <(find build/packages -mindepth 1 -maxdepth 1 -type d -name 'dawn-natives-*' -print0 | sort -z)
          cp build/packages/dawn-natives-manifest.json build/release-assets/
      - name: Compute release metadata
        if: inputs.publishRelease
        id: release_metadata
        shell: bash
        env:
          DAWN_CHROMIUM_VERSION: ${{ steps.build_metadata.outputs.dawn_chromium_version }}
          DAWN_REF: ${{ steps.build_metadata.outputs.dawn_ref }}
        run: |
          readable_date="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          tag_name="dawn-${DAWN_CHROMIUM_VERSION}"
          release_name="Dawn ${DAWN_CHROMIUM_VERSION}"
          {
            echo "tag_name=$tag_name"
            echo "release_name=$release_name"
            echo "body_path=$RUNNER_TEMP/release-notes.md"
          } >> "$GITHUB_OUTPUT"
          {
            echo "dawn-natives build ${GITHUB_RUN_NUMBER}"
            echo
            echo "UTC build date: ${readable_date}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Dawn Chromium version: ${DAWN_CHROMIUM_VERSION}"
            echo "Dawn ref: ${DAWN_REF}"
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > "$RUNNER_TEMP/release-notes.md"
      - name: Publish GitHub release
        if: inputs.publishRelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_metadata.outputs.tag_name }}
          name: ${{ steps.release_metadata.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ steps.release_metadata.outputs.body_path }}
          overwrite_files: true
          fail_on_unmatched_files: true
          make_latest: true
          files: build/release-assets/*
